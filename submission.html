<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>Data Visualization Activity on SVG</title>

	<style type="text/css">
		#header-title {
			font-size: 24px;
		}

		#visualization-activity {
			width: 600px;
			height: 500px;
		}

		/* YOUR CSS CODE WILL GO HERE */


	</style>
</head>

<body>
	<h1 id="header-title">
		In-Class Acitivity by PARKSUYEON
	</h1>

	<svg id="visualization-activity">

  <!-- 축 -->
  <line x1="10" y1="10" x2="10" y2="200" stroke="black" stroke-width="2" />
  <line x1="10" y1="200" x2="500" y2="200" stroke="black" stroke-width="2" />

  <!-- bars -->
  <rect x="30" y="0" width="40" height="200" fill="green" />
  <text x="30" y="220">홍대입구</text>
  <rect x="110" y="50" width="40" height="150" fill="green" />
  <text x="120" y="220">잠실</text>
  <rect x="190" y="80" width="40" height="120" fill="orange" />
  <text x="180" y="220">고속터미널</text>
  <rect x="270" y="90" width="40" height="110" fill="blue" />
  <text x="265" y="220">서울역</text>
  <rect x="350" y="100" width="40" height="100" fill="green" />
  <text x="360" y="220">신림</text>
  <rect x="430" y="110" width="40" height="90" fill="green" />
  <text x="430" y="220">신도림</text>

</svg>

</body>
</html>
